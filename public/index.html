<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inventario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">

        <h2 class="text-center mb-4">Inventario Electrónicos</h2>

        <div class="card p-3 mb-4">
            <div class="row">
                <div class="col"><input id="nombre" class="form-control" placeholder="Nombre"></div>
                <div class="col"><input id="precio" type="number" class="form-control" placeholder="Precio"></div>
                <div class="col"><input id="stock" type="number" class="form-control" placeholder="Stock"></div>
                <div class="col"><input type="file" id="imagen" class="form-control"></div>
                <div class="col">
                    <button class="btn btn-primary w-100" onclick="guardar()">Guardar</button>
                </div>
            </div>
        </div>

        <input type="text" id="buscar" class="form-control mb-3" placeholder="Buscar..." onkeyup="filtrar()">

        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>

    </div>

    <script>
        let editando = false;
        let idEditar = null;

        const API = "http://localhost:3000/api/productos";

        // CARGAR PRODUCTOS
        async function cargar() {
            const res = await fetch(API);
            const data = await res.json();

            const tabla = document.getElementById("tabla");
            tabla.innerHTML = "";

            data.forEach(p => {
                        tabla.innerHTML += `
        <tr>
            <td>${p.id}</td>
            <td>
                ${p.imagen ? `<img src="uploads/${p.imagen}" width="50"><br>` : ''}
                ${p.nombre}
            </td>
            <td>${p.precio}</td>
            <td>${p.stock}</td>
            <td>
                <button class="btn btn-warning btn-sm" onclick="editar(${p.id}, '${p.nombre}', ${p.precio}, ${p.stock})">Editar</button>
                <button class="btn btn-danger btn-sm" onclick="eliminar(${p.id})">Eliminar</button>
            </td>
        </tr>`;
    });
}

// GUARDAR (CREATE / UPDATE)
async function guardar() {
    const formData = new FormData();

    formData.append("nombre", document.getElementById("nombre").value);
    formData.append("precio", document.getElementById("precio").value);
    formData.append("stock", document.getElementById("stock").value);

    const imagen = document.getElementById("imagen").files[0];
    if (imagen) {
        formData.append("imagen", imagen);
    }

    if (editando) {
        await fetch(API + "/" + idEditar, {
            method: "PUT",
            body: formData
        });
        editando = false;
    } else {
        await fetch(API, {
            method: "POST",
            body: formData
        });
    }

    limpiar();
    cargar();
}

// EDITAR
function editar(id, nombre, precio, stock){
    document.getElementById("nombre").value = nombre;
    document.getElementById("precio").value = precio;
    document.getElementById("stock").value = stock;

    editando = true;
    idEditar = id;
}

// ELIMINAR
async function eliminar(id){
    await fetch(API + "/" + id, { method: "DELETE" });
    cargar();
}

// LIMPIAR
function limpiar(){
    document.getElementById("nombre").value = "";
    document.getElementById("precio").value = "";
    document.getElementById("stock").value = "";
    document.getElementById("imagen").value = "";
}

// BUSCADOR
function filtrar(){
    let texto = document.getElementById("buscar").value.toLowerCase();
    let filas = document.querySelectorAll("#tabla tr");

    filas.forEach(fila => {
        fila.style.display = fila.innerText.toLowerCase().includes(texto) ? "" : "none";
    });
}

cargar();
    </script>

</body>

</html>
